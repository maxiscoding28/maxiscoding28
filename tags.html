---
layout: default
title: Tags
permalink: /tags/
---
<h1>Posts by Tag</h1>
{% for tag in site.tags %}
  <h2 id="{{ tag[0] | slugify }}">{{ tag[0] }}</h2>
  <ul>
    {% for post in tag[1] %}
      <li>
        <span>{{ post.date | date: "%Y-%m-%d" }}</span>
        &mdash;
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
      </li>
    {% endfor %}
  </ul>
{% endfor %}
<p><a href="{{ '/blog/' | relative_url }}">&larr; Blog</a></p>
