---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  <p><time>{{ page.date | date: "%B %d, %Y" }}</time></p>
  {% if page.tags.size > 0 %}
  <p>Tags:
    {% for tag in page.tags %}
      <a href="{{ '/tags/' | relative_url }}#{{ tag | slugify }}">{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
    {% endfor %}
  </p>
  {% endif %}
  {{ content }}
  <p><a href="{{ '/blog/' | relative_url }}">&larr; Blog</a></p>
</article>
